# The main pipeline for olist_ecommerce_data

resources:
  pipelines:
    olist_ecommerce_data_etl:
      name: olist_ecommerce_data_etl
      catalog: ${var.catalog}
      schema: ${var.schema}
      serverless: true
      root_path: "../src/olist_ecommerce_data_etl"

      libraries:
        - glob:
            include: ../src/olist_ecommerce_data_etl/transformations/**

      environment:
        dependencies:
          # We include every dependency defined by pyproject.toml by defining an editable environment
          # that points to the folder where pyproject.toml is deployed.
          - --editable ${workspace.file_path}
